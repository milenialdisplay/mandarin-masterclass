<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Mandarin Teacher - HSK Certified</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .level-badge {
            display: inline-block;
            background: #e94560;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .teacher-message {
            justify-content: flex-start;
        }
        
        .student-message {
            justify-content: flex-end;
        }
        
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .teacher-message .bubble {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .student-message .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .small-btn {
            padding: 8px 15px;
            font-size: 12px;
            background: #764ba2;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .bubble {
                max-width: 85%;
                font-size: 14px;
            }
            
            button {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 AI Mandarin Teacher</h1>
            <p>HSK Certified Curriculum</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message teacher-message">
                <div class="bubble">
                    👋 Nǐ hǎo! I'm your AI Mandarin teacher. Let's begin your HSK 1 journey!<br>
                    Type "help" to see commands, or just start speaking!
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
            <div class="controls">
                <button class="small-btn" onclick="location.href='/dashboard'">📊 Dashboard</button>
                <button class="small-btn" onclick="location.href='/certificate'">🎓 Certificate</button>
                <button class="small-btn" onclick="location.href='/hsk-practice'">📝 HSK Test</button>
                <button class="small-btn" onclick="location.href='/hskk-speaking'">🎤 Speaking Test</button>
                <button class="small-btn" onclick="location.href='/homework'">📚 Homework</button>
                <button class="small-btn" onclick="levelUp()">⬆️ Level Up</button>
                <button class="small-btn" onclick="levelDown()">⬇️ Level Down</button>
                <button class="small-btn" onclick="clearChat()">🗑️ Clear</button>
            </div>
            <div class="status" id="status">Ready to learn Mandarin 🇨🇳</div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        
        function addMessage(text, isStudent) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = isStudent ? 'message student-message' : 'message teacher-message';
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            updateStatus("Teacher is thinking... 🤔");
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, level: currentLevel })
                });
                
                const data = await response.json();
                addMessage(data.reply, false);
                updateStatus("Ready for next question");
            } catch (error) {
                addMessage("Sorry, connection error. Please refresh the page.", false);
                updateStatus("Error - check connection");
            }
        }
        
        function updateStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }
        
        function levelUp() {
            if (currentLevel < 6) {
                currentLevel++;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`🎉 You've been promoted to HSK Level ${currentLevel}! Great progress!`, false);
            } else {
                addMessage("🌟 You've reached HSK 6! You're practically fluent!", false);
            }
        }
        
        function levelDown() {
            if (currentLevel > 1) {
                currentLevel--;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`📚 Moving to HSK Level ${currentLevel} for review.`, false);
            } else {
                addMessage("You're already at HSK 1 - the perfect place to build your foundation!", false);
            }
        }
        
        function clearChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '<div class="message teacher-message"><div class="bubble">Chat cleared! Ready to continue learning Mandarin? 🎓</div></div>';
        }
    </script>
</body>
</html>
