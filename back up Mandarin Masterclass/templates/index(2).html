<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Mandarin Teacher - HSK Certified</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .level-badge {
            display: inline-block;
            background: #e94560;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .teacher-message {
            justify-content: flex-start;
        }
        
        .student-message {
            justify-content: flex-end;
        }
        
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .teacher-message .bubble {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .student-message .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .voice-btn {
            background: #e94560;
        }
        
        .voice-btn.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .suggestion-btn {
            background: #f0f0f0;
            color: #333;
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .suggestion-btn:hover {
            background: #e0e0e0;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .small-btn {
            padding: 8px 15px;
            font-size: 12px;
            background: #764ba2;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .bubble {
                max-width: 90%;
                font-size: 14px;
            }
            
            button {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 AI Mandarin Teacher</h1>
            <p>HSK Certified Curriculum</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <!-- Welcome message will be added by JavaScript -->
        </div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your response here..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
                <button id="voiceBtn" class="voice-btn" onclick="toggleRecording()">🎤 Speak</button>
            </div>
            <div class="suggestions" id="suggestions">
                <!-- Dynamic suggestions will appear here -->
            </div>
            <div class="controls">
                <button class="small-btn" onclick="location.href='/dashboard'">📊 Dashboard</button>
                <button class="small-btn" onclick="location.href='/certificate'">🎓 Certificate</button>
                <button class="small-btn" onclick="location.href='/hsk-practice'">📝 HSK Test</button>
                <button class="small-btn" onclick="location.href='/homework'">📚 Homework</button>
                <button class="small-btn" onclick="restartLesson()">🔄 New Lesson</button>
                <button class="small-btn" onclick="levelUp()">⬆️ Level Up</button>
                <button class="small-btn" onclick="levelDown()">⬇️ Level Down</button>
            </div>
            <div class="status" id="status">✅ Connected. Teacher is ready!</div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let isRecording = false;
        let recognition = null;
        let lessonState = {
            started: false,
            currentTopic: null,
            waitingForResponse: false
        };
        
        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                document.getElementById('messageInput').value = text;
                sendMessage();
                stopRecording();
            };
            
            recognition.onerror = function() {
                updateStatus("Microphone error. Please type instead.");
                stopRecording();
            };
            
            recognition.onend = function() {
                stopRecording();
            };
        } else {
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.disabled = true;
            voiceBtn.style.opacity = '0.5';
            updateStatus("Voice not supported in this browser. Please type.");
        }
        
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            if (!recognition) return;
            isRecording = true;
            recognition.start();
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.add('recording');
            voiceBtn.innerHTML = '🔴 Recording...';
            updateStatus("Listening... speak in Mandarin or English");
        }
        
        function stopRecording() {
            if (recognition) {
                recognition.stop();
            }
            isRecording = false;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '🎤 Speak';
            updateStatus("Ready");
        }
        
        function updateStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }
        
        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message teacher-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function addMessage(text, isStudent) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = isStudent ? 'message student-message' : 'message teacher-message';
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addSuggestions(suggestions) {
            const suggestionsDiv = document.getElementById('suggestions');
            suggestionsDiv.innerHTML = '';
            suggestions.forEach(suggestion => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = suggestion;
                btn.onclick = () => {
                    document.getElementById('messageInput').value = suggestion;
                    sendMessage();
                };
                suggestionsDiv.appendChild(btn);
            });
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            updateStatus("Teacher is thinking... 🤔");
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        level: currentLevel,
                        lessonState: lessonState
                    })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                addMessage(data.reply, false);
                
                // Update suggestions based on response
                if (data.suggestions) {
                    addSuggestions(data.suggestions);
                } else {
                    // Default suggestions based on context
                    addSuggestions([
                        "Continue the lesson",
                        "Practice that again",
                        "I have a question",
                        "Next topic"
                    ]);
                }
                
                updateStatus("Ready for your response");
                
                // Auto-scroll to bottom
                const chatArea = document.getElementById('chatArea');
                chatArea.scrollTop = chatArea.scrollHeight;
                
            } catch (error) {
                hideTypingIndicator();
                addMessage("Sorry, connection error. Please refresh the page.", false);
                updateStatus("Error - check connection");
            }
        }
        
        function restartLesson() {
            lessonState = {
                started: false,
                currentTopic: null,
                waitingForResponse: false
            };
            
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            
            // Send welcome message to start fresh lesson
            sendWelcomeMessage();
        }
        
        async function sendWelcomeMessage() {
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/welcome', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: currentLevel })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                addMessage(data.welcome, false);
                addSuggestions(["Yes, start lesson", "Review previous lesson", "Tell me about this level"]);
                updateStatus("Ready to begin");
                lessonState.started = true;
                
            } catch (error) {
                hideTypingIndicator();
                addMessage("👋 Welcome to Mandarin Teacher! Type 'start lesson' to begin your HSK journey!", false);
                addSuggestions(["start lesson", "help", "what is HSK?"]);
            }
        }
        
        function levelUp() {
            if (currentLevel < 6) {
                currentLevel++;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`🎉 You've been promoted to HSK Level ${currentLevel}! Great progress!`, false);
                addSuggestions(["Start new lesson", "Review vocabulary", "Take practice test"]);
                // Reset lesson state for new level
                lessonState = { started: false, currentTopic: null, waitingForResponse: false };
            } else {
                addMessage("🌟 You've reached HSK 6! You're practically fluent! Ready for the mastery test?", false);
                addSuggestions(["Take mastery test", "Review advanced topics", "Get certificate"]);
            }
        }
        
        function levelDown() {
            if (currentLevel > 1) {
                currentLevel--;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`📚 Moving to HSK Level ${currentLevel} for review. Take your time!`, false);
                addSuggestions(["Start review lesson", "Practice basics", "Take level test"]);
                lessonState = { started: false, currentTopic: null, waitingForResponse: false };
            } else {
                addMessage("You're already at HSK 1 - the perfect place to build your foundation! Type 'start lesson' to begin.", false);
                addSuggestions(["start lesson", "learn greetings", "learn numbers"]);
            }
        }
        
        // Initialize the app with welcome message
        sendWelcomeMessage();
    </script>
</body>
</html>
