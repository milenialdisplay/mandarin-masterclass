services:
  - type: web
    name: mandarin-masterclass
    runtime: python
    repo: https://github.com/YOUR_USERNAME/mandarin-masterclass
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0