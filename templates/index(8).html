<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HSK Mandarin Teacher - Virtual Classroom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a472a;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: #1a472a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.8; }
        
        .level-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a472a;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 13px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .language-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        
        .lang-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn.active {
            background: #ffd700;
            color: #1a472a;
            border-color: #ffd700;
        }
        
        .progress-container { padding: 15px; background: white; }
        .progress-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #2d6a4f;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .chat-area {
            height: 420px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }
        
        .message { margin-bottom: 15px; display: flex; }
        .teacher-message { justify-content: flex-start; }
        .student-message { justify-content: flex-end; }
        
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .teacher-message .bubble {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .student-message .bubble {
            background: #2d6a4f;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .speaker-btn {
            background: #ffd700;
            color: #1a472a;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .input-area { padding: 15px; background: white; }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }
        
        input[type="text"]:focus { border-color: #2d6a4f; }
        
        button {
            padding: 12px 24px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        button:hover { background: #1a472a; }
        
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .suggestion-btn {
            background: #f0f0f0;
            color: #333;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .small-btn {
            padding: 6px 12px;
            font-size: 11px;
            background: #764ba2;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }
        
        .audio-status {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #333;
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HSK Mandarin Teacher</h1>
            <p>Virtual Classroom | Complete HSK 1-6</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">English</button>
                <button class="lang-btn" data-lang="id" onclick="setLanguage('id')">Bahasa Indonesia</button>
                <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-label">Lesson Progress</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea"></div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your answer..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
            <div class="controls">
		<button class="small-btn" onclick="location.href='/lessons'">📖 Lessons</button>
                <button class="small-btn" onclick="restartLesson()">New Lesson</button>
                <button class="small-btn" onclick="levelUp()">Level Up</button>
                <button class="small-btn" onclick="levelDown()">Level Down</button>
            </div>
            <div class="status" id="status">Ready. Type yes to begin.</div>
        </div>
    </div>
    <div class="audio-status" id="audioStatus">Audio Ready</div>

    <script>
        let currentLevel = 1;
        let currentLanguage = 'en';
        let currentAudio = null;
        
        // Browser TTS function (works for all languages, especially Indonesian)
        function speakWithBrowserTTS(text, lang) {
            if (!text) return;
            
            let cleanText = text.replace(/[\[\]\(\)\*\_\#\>\<]/g, ' ').replace(/\s+/g, ' ').trim();
            if (cleanText.length > 300) cleanText = cleanText.substring(0, 300);
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Set language
            if (lang === 'id') {
                utterance.lang = 'id-ID';
            } else if (lang === 'zh') {
                utterance.lang = 'zh-CN';
            } else {
                utterance.lang = 'en-US';
            }
            
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            
            // Try to find a good voice
            const voices = speechSynthesis.getVoices();
            let selectedVoice = null;
            
            if (lang === 'id') {
                selectedVoice = voices.find(v => v.lang === 'id-ID');
            } else if (lang === 'zh') {
                selectedVoice = voices.find(v => v.lang === 'zh-CN' && v.name.includes('Microsoft'));
            }
            
            if (selectedVoice) utterance.voice = selectedVoice;
            
            utterance.onstart = () => {
                document.getElementById('audioStatus').innerHTML = "Speaking...";
                document.getElementById('audioStatus').style.background = "#2d6a4f";
            };
            
            utterance.onend = () => {
                document.getElementById('audioStatus').innerHTML = "Audio Ready";
                document.getElementById('audioStatus').style.background = "#333";
            };
            
            utterance.onerror = () => {
                document.getElementById('audioStatus').innerHTML = "Error";
                setTimeout(() => {
                    document.getElementById('audioStatus').innerHTML = "Audio Ready";
                    document.getElementById('audioStatus').style.background = "#333";
                }, 2000);
            };
            
            speechSynthesis.speak(utterance);
        }
        
        // Main speak function - uses browser TTS for all languages (simpler and works)
        function speakText(text, language) {
            if (!text) return;
            
            // Use browser TTS for all languages (works perfectly for Indonesian)
            speakWithBrowserTTS(text, language);
        }
        
        function addMessage(text, isStudent, wordInfo = null) {
            const chatArea = document.getElementById('chatArea');
            if (!chatArea) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = isStudent ? 'message student-message' : 'message teacher-message';
            
            const escapedText = text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            
            if (isStudent) {
                messageDiv.innerHTML = `<div class="bubble">${escapedText}</div>`;
            } else {
                const safeText = escapedText.replace(/'/g, "\\'");
                messageDiv.innerHTML = `
                    <div class="bubble">
                        ${escapedText}
                        <button class="speaker-btn" onclick="speakText('${safeText}', '${currentLanguage}')">Play Audio</button>
                    </div>
                `;
                // Auto-speak teacher messages
                speakText(escapedText, currentLanguage);
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            if (wordInfo && wordInfo.total_words) {
                const percent = (wordInfo.words_mastered / wordInfo.total_words) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('levelBadge').innerHTML = `HSK Level ${wordInfo.level || currentLevel}`;
            }
        }
        
        function addSuggestions(list) {
            const suggestionsDiv = document.getElementById('suggestions');
            if (!suggestionsDiv) return;
            suggestionsDiv.innerHTML = '';
            if (!list || list.length === 0) return;
            
            list.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = item;
                btn.onclick = () => {
                    document.getElementById('messageInput').value = item;
                    sendMessage();
                };
                suggestionsDiv.appendChild(btn);
            });
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            document.getElementById('status').innerHTML = "Teacher is thinking...";
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        level: currentLevel,
                        language: currentLanguage
                    })
                });
                
                const data = await response.json();
                addMessage(data.reply, false, data.word_info);
                if (data.suggestions) addSuggestions(data.suggestions);
                document.getElementById('status').innerHTML = "Ready";
            } catch (error) {
                console.error("Error:", error);
                addMessage("Connection error. Please refresh the page.", false);
                document.getElementById('status').innerHTML = "Error";
            }
        }
        
        async function startLesson() {
            document.getElementById('status').innerHTML = "Loading...";
            
            try {
                const response = await fetch('/api/welcome', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        level: currentLevel,
                        language: currentLanguage
                    })
                });
                
                const data = await response.json();
                addMessage(data.welcome, false);
                addSuggestions(["yes", "grammar", "conversation", "help"]);
                document.getElementById('status').innerHTML = "Ready. Type yes to begin.";
            } catch (error) {
                console.error("Error:", error);
                addMessage("Welcome to HSK Mandarin Teacher. Type yes to begin your lesson.", false);
                addSuggestions(["yes", "grammar", "conversation"]);
                document.getElementById('status').innerHTML = "Ready";
            }
        }
        
	// Function to play audio for specific text
	async function playAudioText(text, language = 'zh') {
    if (!text) return;
    
    const statusDiv = document.getElementById('status');
    const originalText = statusDiv.innerHTML;
    statusDiv.innerHTML = '🔊 Playing audio...';
    
    try {
        const response = await fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, language: language })
        });
        
        if (response.ok) {
            const audioBlob = await response.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.onended = () => {
                statusDiv.innerHTML = originalText;
                URL.revokeObjectURL(audioUrl);
            };
            audio.play();
        } else {
            // Fallback
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = language === 'zh' ? 'zh-CN' : 'en-US';
            speechSynthesis.speak(utterance);
            utterance.onend = () => {
                statusDiv.innerHTML = originalText;
            };
        }
    } catch (error) {
        console.error('Audio error:', error);
        statusDiv.innerHTML = originalText;
    }
}

	// In the response for new word, add an audio button in the message
if (data.word_info) {
    const audioBtnHtml = `<button class="speaker-btn" onclick="playAudioText('${data.word_info.word}', 'zh')">🔊 Listen</button>`;
    // Add this to your message display
}


        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) btn.classList.add('active');
            });
            localStorage.setItem('preferred_language', lang);
            restartLesson();
        }
        
        function restartLesson() {
            document.getElementById('chatArea').innerHTML = '';
            document.getElementById('progressFill').style.width = '0%';
            startLesson();
        }
        
        function levelUp() {
            if (currentLevel < 6) {
                currentLevel++;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`You have advanced to HSK Level ${currentLevel}. Type yes to begin your new lesson.`, false);
                addSuggestions(["yes", "grammar", "conversation"]);
                setTimeout(() => startLesson(), 1000);
            } else {
                addMessage("You have completed all HSK levels. Congratulations.", false);
            }
        }
        
        function levelDown() {
            if (currentLevel > 1) {
                currentLevel--;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`Moved to HSK Level ${currentLevel} for review. Type yes to begin.`, false);
                addSuggestions(["yes", "grammar", "conversation"]);
                setTimeout(() => startLesson(), 1000);
            } else {
                addMessage("You are at HSK Level 1.", false);
            }
        }
        
        // Pre-load voices
        if (speechSynthesis) {
            speechSynthesis.getVoices();
            // Chrome needs this event to load voices properly
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = function() {
                    console.log("Voices loaded");
                };
            }
        }
        
        // Load saved language preference
        const savedLang = localStorage.getItem('preferred_language');
        if (savedLang) setLanguage(savedLang);
        
        document.addEventListener('DOMContentLoaded', startLesson);
    </script>
</body>
</html>
