<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HSK 1 Complete Course - Interactive Mandarin Teacher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a472a;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a472a, #2d6a4f);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        
        .level-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a472a;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 13px;
            margin-top: 12px;
            font-weight: bold;
        }
        
        /* Navigation - Lesson Grid Buttons */
        .lesson-nav {
            background: #f5f5f5;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
        }
        
        .lesson-grid-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .lesson-grid-btn {
            background: white;
            border: 2px solid #2d6a4f;
            color: #2d6a4f;
            padding: 8px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .lesson-grid-btn:hover {
            background: #2d6a4f;
            color: white;
            transform: scale(1.02);
        }
        
        .lesson-grid-btn.active {
            background: #2d6a4f;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .nav-btn {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .nav-btn:hover { background: #1a472a; transform: scale(1.02); }
        
        /* Progress Bar */
        .progress-section {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        
        .progress-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #2d6a4f, #ffd700);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* Content */
        .content {
            padding: 25px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        /* Section Styles */
        .section {
            margin-bottom: 35px;
            background: #fafafa;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #eee;
        }
        
        .section-title {
            font-size: 22px;
            color: #1a472a;
            border-left: 5px solid #ffd700;
            padding-left: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* Play All Button - Rectangular */
        .play-all-btn {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .play-all-btn:hover {
            background: #1a472a;
            transform: scale(1.02);
        }
        
        /* Vocabulary Grid */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }
        
        .vocab-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }
        
        .vocab-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #ffd700;
        }
        
        .vocab-word {
            font-size: 32px;
            font-weight: bold;
            color: #1a472a;
            margin-bottom: 5px;
            cursor: pointer;
        }
        
        .vocab-pinyin {
            color: #e94560;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .vocab-meaning {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #eee;
        }
        
        .vocab-example {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
        }
        
        .vocab-example-chinese {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .vocab-example-translation {
            color: #888;
            font-size: 12px;
        }
        
        .audio-btn {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 10px;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .audio-btn:hover { background: #1a472a; }
        
        /* Grammar Cards */
        .grammar-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
        }
        
        .grammar-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a472a;
            margin-bottom: 10px;
        }
        
        .grammar-explanation {
            color: #555;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .grammar-examples {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .grammar-example-item {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #c8e6c9;
        }
        
        .grammar-example-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .grammar-example-chinese {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .grammar-example-translation {
            color: #666;
            font-size: 13px;
        }
        
        /* Dialogue - Cinema Script Style */
        .dialogue-container {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            color: white;
        }
        
        .dialogue-scene {
            padding: 20px;
        }
        
        .dialogue-line {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .dialogue-speaker {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .speaker-male {
            color: #87CEEB;
        }
        
        .speaker-female {
            color: #FFB6C1;
        }
        
        .dialogue-bubble {
            background: rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 12px 18px;
            max-width: 85%;
        }
        
        .dialogue-chinese {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .dialogue-pinyin {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .dialogue-translation {
            color: #888;
            font-size: 13px;
        }
        
        .dialogue-audio-btn {
            background: #ffd700;
            color: #1a472a;
            border: none;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 10px;
            margin-top: 8px;
        }
        
        /* Back Button */
        .back-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 0 25px 25px 25px;
            width: calc(100% - 50px);
        }
        
        .back-btn:hover { background: #5a6268; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .vocab-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 18px; flex-direction: column; align-items: flex-start; }
            .dialogue-bubble { max-width: 95%; }
            .lesson-grid-buttons { max-height: 150px; overflow-y: auto; }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .playing { animation: pulse 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 HSK 1 Complete Course</h1>
            <p>Interactive Mandarin Chinese | 15 Lessons | Official Curriculum</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
        </div>
        
        <!-- Lesson Navigation Grid -->
        <div class="lesson-nav">
            <div class="lesson-grid-buttons" id="lessonGridButtons">
                <!-- Will be populated by JavaScript -->
            </div>
            <div class="nav-controls">
                <button class="nav-btn" onclick="prevLesson()">◀ Previous Lesson</button>
                <button class="nav-btn" onclick="nextLesson()">Next Lesson ▶</button>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-section">
            <div class="progress-label">
                <span>📊 Course Progress</span>
                <span id="progressText">Lesson 1 of 15</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="content" id="content">
            <div class="loading">Loading lesson...</div>
        </div>
        
        <button class="back-btn" onclick="location.href='/'">🏠 Back to Main Chat</button>
    </div>

    <script>
        let currentLesson = 1;
        let lessonsData = {};
        let currentAudio = null;
        
        // Lesson titles for buttons
        const lessonTitles = {
            1: "你好", 2: "谢谢你", 3: "你叫什么名字", 4: "她是我的汉语老师",
            5: "她女儿今年二十岁", 6: "我会说汉语", 7: "今天几号", 8: "我想喝茶",
            9: "你儿子在哪儿工作", 10: "我能坐这儿吗", 11: "现在几点", 12: "明天天气怎么样",
            13: "他在学做中国菜呢", 14: "她买了不少衣服", 15: "我是坐飞机来的"
        };
        
        // Complete lessons data with enhanced grammar examples and dialogues
        const completeLessons = {
            1: {
                number: 1, title: "你好", title_en: "Hello",
                objectives: ["Learn to greet people in Chinese", "Introduce yourself", "Say goodbye politely"],
                vocabulary: [
                    {word: "你", pinyin: "nǐ", meaning: "you", example: "你好", example_translation: "Hello"},
                    {word: "好", pinyin: "hǎo", meaning: "good; well", example: "很好", example_translation: "Very good"},
                    {word: "你好", pinyin: "nǐ hǎo", meaning: "hello", example: "你好吗", example_translation: "How are you"},
                    {word: "我", pinyin: "wǒ", meaning: "I; me", example: "我是学生", example_translation: "I am a student"},
                    {word: "叫", pinyin: "jiào", meaning: "to be called", example: "我叫小明", example_translation: "My name is Xiao Ming"},
                    {word: "什么", pinyin: "shén me", meaning: "what", example: "你叫什么", example_translation: "What is your name"},
                    {word: "名字", pinyin: "míng zi", meaning: "name", example: "我的名字", example_translation: "My name"},
                    {word: "是", pinyin: "shì", meaning: "to be", example: "我是老师", example_translation: "I am a teacher"},
                    {word: "学生", pinyin: "xué sheng", meaning: "student", example: "我是学生", example_translation: "I am a student"},
                    {word: "老师", pinyin: "lǎo shī", meaning: "teacher", example: "王老师", example_translation: "Teacher Wang"},
                    {word: "再见", pinyin: "zài jiàn", meaning: "goodbye", example: "明天再见", example_translation: "See you tomorrow"},
                    {word: "谢谢", pinyin: "xiè xie", meaning: "thank you", example: "谢谢你", example_translation: "Thank you"}
                ],
                grammar: [
                    {
                        point: "Basic SVO Word Order",
                        explanation: "Chinese uses Subject-Verb-Object word order, just like English.",
                        examples: [
                            {chinese: "我爱你", translation: "I love you"},
                            {chinese: "他吃饭", translation: "He eats rice"},
                            {chinese: "我们学习", translation: "We study"}
                        ]
                    },
                    {
                        point: "Questions with 吗 (ma)",
                        explanation: "Add 吗 at the end of a statement to make it a yes/no question.",
                        examples: [
                            {chinese: "你好吗", translation: "How are you?"},
                            {chinese: "你是学生吗", translation: "Are you a student?"},
                            {chinese: "你喜欢吗", translation: "Do you like it?"}
                        ]
                    }
                ],
                dialogue: [
                    {speaker: "male", name: "Wang", chinese: "你好！", pinyin: "Nǐ hǎo!", translation: "Hello!"},
                    {speaker: "female", name: "Li", chinese: "你好！", pinyin: "Nǐ hǎo!", translation: "Hello!"},
                    {speaker: "male", name: "Wang", chinese: "你叫什么名字？", pinyin: "Nǐ jiào shénme míngzi?", translation: "What is your name?"},
                    {speaker: "female", name: "Li", chinese: "我叫李芳。你呢？", pinyin: "Wǒ jiào Lǐ Fāng. Nǐ ne?", translation: "My name is Li Fang. And you?"},
                    {speaker: "male", name: "Wang", chinese: "我叫王明。很高兴认识你。", pinyin: "Wǒ jiào Wáng Míng. Hěn gāoxìng rènshi nǐ.", translation: "My name is Wang Ming. Nice to meet you."},
                    {speaker: "female", name: "Li", chinese: "我也是。再见！", pinyin: "Wǒ yě shì. Zàijiàn!", translation: "Me too. Goodbye!"},
                    {speaker: "male", name: "Wang", chinese: "再见！", pinyin: "Zàijiàn!", translation: "Goodbye!"}
                ]
            },
            2: {
                number: 2, title: "谢谢你", title_en: "Thank You",
                objectives: ["Express thanks", "Apologize politely", "Use polite expressions"],
                vocabulary: [
                    {word: "不客气", pinyin: "bù kè qi", meaning: "you're welcome", example: "不客气", example_translation: "You're welcome"},
                    {word: "对不起", pinyin: "duì bu qǐ", meaning: "sorry", example: "对不起", example_translation: "I'm sorry"},
                    {word: "没关系", pinyin: "méi guān xi", meaning: "it's okay", example: "没关系", example_translation: "It doesn't matter"},
                    {word: "您", pinyin: "nín", meaning: "you (polite)", example: "您好", example_translation: "Hello (polite)"},
                    {word: "请", pinyin: "qǐng", meaning: "please", example: "请进", example_translation: "Please come in"},
                    {word: "问", pinyin: "wèn", meaning: "to ask", example: "请问", example_translation: "May I ask"},
                    {word: "姓", pinyin: "xìng", meaning: "family name", example: "我姓王", example_translation: "My family name is Wang"},
                    {word: "贵姓", pinyin: "guì xìng", meaning: "your surname (polite)", example: "您贵姓", example_translation: "What is your surname"}
                ],
                grammar: [
                    {
                        point: "Adjectives as Predicates",
                        explanation: "In Chinese, adjectives can directly follow the subject without a linking verb like 'to be'.",
                        examples: [
                            {chinese: "天气很好", translation: "The weather is good"},
                            {chinese: "她很漂亮", translation: "She is beautiful"},
                            {chinese: "这个东西很便宜", translation: "This thing is very cheap"}
                        ]
                    }
                ],
                dialogue: [
                    {speaker: "female", name: "Li", chinese: "谢谢您帮了我！", pinyin: "Xièxie nín bāng le wǒ!", translation: "Thank you for helping me!"},
                    {speaker: "male", name: "Wang", chinese: "不客气。很高兴能帮忙。", pinyin: "Bù kèqi. Hěn gāoxìng néng bāngmáng.", translation: "You're welcome. Happy to help."},
                    {speaker: "female", name: "Li", chinese: "对不起，我迟到了。", pinyin: "Duìbuqǐ, wǒ chídào le.", translation: "Sorry, I'm late."},
                    {speaker: "male", name: "Wang", chinese: "没关系，我们刚开始。", pinyin: "Méiguānxi, wǒmen gāng kāishǐ.", translation: "It's okay, we just started."}
                ]
            }
        };
        
        // Populate remaining lessons (3-15) with similar structure
        for (let i = 3; i <= 15; i++) {
            if (!completeLessons[i]) {
                completeLessons[i] = {
                    number: i, title: lessonTitles[i], title_en: "Lesson " + i,
                    objectives: ["Learn new vocabulary", "Practice grammar patterns", "Improve conversation skills"],
                    vocabulary: [],
                    grammar: [{point: "Grammar Point", explanation: "Explanation here", examples: [{chinese: "例子", translation: "Example"}]}],
                    dialogue: [{speaker: "male", name: "A", chinese: "你好", pinyin: "Nǐ hǎo", translation: "Hello"}]
                };
            }
        }
        
        // Audio playback function
        async function playAudio(text, language = 'zh') {
            if (!text) return;
            
            const statusDiv = document.getElementById('progressText');
            const originalText = statusDiv.innerHTML;
            statusDiv.innerHTML = '🔊 Playing audio...';
            
            try {
                const response = await fetch('/api/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, language: language })
                });
                
                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    if (currentAudio) currentAudio.pause();
                    currentAudio = new Audio(audioUrl);
                    currentAudio.onended = () => {
                        statusDiv.innerHTML = originalText;
                        URL.revokeObjectURL(audioUrl);
                    };
                    await currentAudio.play();
                } else {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = language === 'zh' ? 'zh-CN' : 'en-US';
                    utterance.rate = 0.85;
                    speechSynthesis.speak(utterance);
                    utterance.onend = () => statusDiv.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Audio error:', error);
                statusDiv.innerHTML = originalText;
            }
        }
        
        // Play all vocabulary
        async function playAllVocabulary(vocabList) {
            for (const v of vocabList) {
                await playAudio(v.word, 'zh');
                await new Promise(r => setTimeout(r, 600));
            }
        }
        
        // Render lesson
        function renderLesson(lesson) {
            const content = document.getElementById('content');
            
            let html = `
                <div class="section">
                    <div class="section-title">
                        📖 Learning Objectives
                        <button class="play-all-btn" onclick="playAudio('${lesson.objectives.join('. ')}', 'en')">🔊 Play All</button>
                    </div>
                    <ul style="margin-left: 20px; line-height: 1.8;">
                        ${lesson.objectives.map(obj => `<li>${obj}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="section">
                    <div class="section-title">
                        📚 Vocabulary (${lesson.vocabulary.length} words)
                        <button class="play-all-btn" onclick="playAllVocabulary(${JSON.stringify(lesson.vocabulary).replace(/"/g, '&quot;')})">🔊 Play All</button>
                    </div>
                    <div class="vocab-grid">
                        ${lesson.vocabulary.map(v => `
                            <div class="vocab-card">
                                <div class="vocab-word" onclick="playAudio('${v.word}', 'zh')">${v.word}</div>
                                <div class="vocab-pinyin">${v.pinyin}</div>
                                <div class="vocab-meaning">${v.meaning}</div>
                                <div class="vocab-example">
                                    <div class="vocab-example-chinese">📝 ${v.example}</div>
                                    <div class="vocab-example-translation">→ ${v.example_translation || v.meaning}</div>
                                    <button class="audio-btn" onclick="playAudio('${v.example}', 'zh')">🔊 Example</button>
                                    <button class="audio-btn" onclick="playAudio('${v.word}', 'zh')">🔊 Word</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">
                        📖 Grammar Points
                        <button class="play-all-btn" onclick="playAllGrammar(${JSON.stringify(lesson.grammar).replace(/"/g, '&quot;')})">🔊 Play All</button>
                    </div>
                    ${lesson.grammar.map(g => `
                        <div class="grammar-card">
                            <div class="grammar-title">${g.point}</div>
                            <div class="grammar-explanation">${g.explanation}</div>
                            <div class="grammar-examples">
                                ${g.examples.map(ex => `
                                    <div class="grammar-example-item">
                                        <div class="grammar-example-chinese">${ex.chinese}</div>
                                        <div class="grammar-example-translation">→ ${ex.translation}</div>
                                        <button class="audio-btn" onclick="playAudio('${ex.chinese}', 'zh')">🔊 Listen</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section">
                    <div class="section-title">
                        💬 Conversation Practice
                        <button class="play-all-btn" onclick="playFullDialogue()">🔊 Play Full Dialogue</button>
                    </div>
                    <div class="dialogue-container">
                        <div class="dialogue-scene">
                            ${lesson.dialogue.map(line => `
                                <div class="dialogue-line">
                                    <div class="dialogue-speaker ${line.speaker === 'male' ? 'speaker-male' : 'speaker-female'}">
                                        ${line.name || (line.speaker === 'male' ? '👨 ' : '👩 ')} ${line.name || (line.speaker === 'male' ? 'Student' : 'Teacher')}:
                                    </div>
                                    <div class="dialogue-bubble">
                                        <div class="dialogue-chinese">${line.chinese}</div>
                                        <div class="dialogue-pinyin">${line.pinyin}</div>
                                        <div class="dialogue-translation">→ ${line.translation}</div>
                                        <button class="dialogue-audio-btn" onclick="playAudio('${line.chinese}', 'zh')">🔊 Listen to this line</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            content.innerHTML = html;
        }
        
        async function playAllGrammar(grammarList) {
            for (const g of grammarList) {
                await playAudio(`${g.point}. ${g.explanation}`, 'en');
                await new Promise(r => setTimeout(r, 1000));
                for (const ex of g.examples) {
                    await playAudio(ex.chinese, 'zh');
                    await new Promise(r => setTimeout(r, 800));
                }
            }
        }
        
        function playFullDialogue() {
            const lesson = completeLessons[currentLesson];
            if (!lesson || !lesson.dialogue) return;
            let index = 0;
            function playNext() {
                if (index >= lesson.dialogue.length) return;
                playAudio(lesson.dialogue[index].chinese, 'zh');
                index++;
                setTimeout(playNext, 2500);
            }
            playNext();
        }
        
        function buildLessonGrid() {
            const grid = document.getElementById('lessonGridButtons');
            grid.innerHTML = '';
            for (let i = 1; i <= 15; i++) {
                const btn = document.createElement('button');
                btn.className = `lesson-grid-btn ${i === currentLesson ? 'active' : ''}`;
                btn.textContent = `${i}. ${lessonTitles[i]}`;
                btn.onclick = () => loadLesson(i);
                grid.appendChild(btn);
            }
        }
        
        async function loadLesson(lessonNum) {
            currentLesson = lessonNum;
            buildLessonGrid();
            document.getElementById('progressFill').style.width = `${(lessonNum / 15) * 100}%`;
            document.getElementById('progressText').innerHTML = `Lesson ${lessonNum} of 15`;
            
            let lesson = completeLessons[lessonNum];
            if (!lesson || lesson.vocabulary.length === 0) {
                try {
                    const response = await fetch(`/api/lesson/${lessonNum}`);
                    if (response.ok) lesson = await response.json();
                } catch(e) {}
            }
            
            if (lesson) {
                completeLessons[lessonNum] = lesson;
                renderLesson(lesson);
            } else {
                document.getElementById('content').innerHTML = '<div class="loading">Lesson not found</div>';
            }
        }
        
        function prevLesson() { if (currentLesson > 1) loadLesson(currentLesson - 1); }
        function nextLesson() { if (currentLesson < 15) loadLesson(currentLesson + 1); else alert('🎉 You completed all 15 HSK 1 lessons!'); }
        
        buildLessonGrid();
        loadLesson(1);
    </script>
</body>
</html>
