<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HSK Mandarin Teacher - Natural Voice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #1a472a;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .level-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a472a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            font-weight: bold;
        }
        
        .progress-container {
            padding: 10px 15px;
            background: white;
        }
        
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #2d6a4f, #ffd700);
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }
        
        .message {
            margin-bottom: 12px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .teacher-message {
            justify-content: flex-start;
        }
        
        .student-message {
            justify-content: flex-end;
        }
        
        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 14px;
        }
        
        .teacher-message .bubble {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .student-message .bubble {
            background: #2d6a4f;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .speaker-btn {
            background: #ffd700;
            color: #1a472a;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }
        
        .speaker-btn:hover {
            background: #e6c200;
        }
        
        .input-area {
            padding: 15px;
            background: white;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex: 2;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }
        
        input[type="text"]:focus {
            border-color: #2d6a4f;
        }
        
        button {
            padding: 12px 20px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        
        button:hover {
            background: #1a472a;
        }
        
        .suggestions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
            margin-bottom: 8px;
        }
        
        .suggestion-btn {
            background: #f0f0f0;
            color: #333;
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }
        
        .suggestion-btn:hover {
            background: #e0e0e0;
        }
        
        .controls {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .small-btn {
            padding: 6px 10px;
            font-size: 10px;
            background: #764ba2;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            color: white;
        }
        
        .small-btn:hover {
            background: #5a3a7a;
        }
        
        .status {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #eee;
            margin-top: 8px;
        }
        
        .audio-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #333;
            color: #ffd700;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 HSK Mandarin Teacher</h1>
            <p>Natural Voice • Complete HSK 1-6</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea"></div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type 'yes' to start..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
            <div class="controls">
                <button class="small-btn" onclick="restartLesson()">🔄 New Lesson</button>
                <button class="small-btn" onclick="levelUp()">⬆️ Level Up</button>
                <button class="small-btn" onclick="levelDown()">⬇️ Level Down</button>
            </div>
            <div class="status" id="status">✅ Ready | Type 'yes' to begin</div>
        </div>
    </div>
    <div class="audio-status" id="audioStatus">🎤 Ready</div>

    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentLevel = 1;
        let currentAudio = null;
        let audioQueue = [];
        
        // ============================================
        // SPEECH FUNCTIONS
        // ============================================
        
        async function speakText(text) {
            if (!text || text.length === 0) return;
            
            let cleanText = text.replace(/[\[\]\(\)\*\_\#\>\<]/g, ' ').replace(/\s+/g, ' ').trim();
            if (cleanText.length > 200) cleanText = cleanText.substring(0, 200);
            
            const audioStatus = document.getElementById('audioStatus');
            audioStatus.innerHTML = "🔊 Generating...";
            audioStatus.style.background = "#e94560";
            
            try {
                const response = await fetch('/api/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: cleanText })
                });
                
                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio = null;
                    }
                    
                    currentAudio = new Audio(audioUrl);
                    currentAudio.onplay = () => {
                        audioStatus.innerHTML = "🔊 Speaking...";
                        audioStatus.style.background = "#2d6a4f";
                    };
                    currentAudio.onended = () => {
                        audioStatus.innerHTML = "✅ Ready";
                        audioStatus.style.background = "#333";
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                    };
                    currentAudio.onerror = () => {
                        audioStatus.innerHTML = "⚠️ Error";
                        audioStatus.style.background = "#e94560";
                        currentAudio = null;
                    };
                    await currentAudio.play();
                } else {
                    audioStatus.innerHTML = "⚠️ Server error";
                    setTimeout(() => {
                        audioStatus.innerHTML = "✅ Ready";
                        audioStatus.style.background = "#333";
                    }, 2000);
                }
            } catch (error) {
                console.error("TTS error:", error);
                audioStatus.innerHTML = "⚠️ Error";
                setTimeout(() => {
                    audioStatus.innerHTML = "✅ Ready";
                    audioStatus.style.background = "#333";
                }, 2000);
            }
        }
        
        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function addMessage(text, isStudent) {
            const chatArea = document.getElementById('chatArea');
            if (!chatArea) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = isStudent ? 'message student-message' : 'message teacher-message';
            
            const escapedText = text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            
            if (isStudent) {
                messageDiv.innerHTML = `<div class="bubble">${escapedText.replace(/\n/g, '<br>')}</div>`;
            } else {
                const safeText = escapedText.replace(/'/g, "\\'");
                messageDiv.innerHTML = `
                    <div class="bubble">
                        ${escapedText.replace(/\n/g, '<br>')}
                        <button class="speaker-btn" onclick="speakText('${safeText}')">🔊</button>
                    </div>
                `;
                // Auto-speak teacher messages
                speakText(escapedText);
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addSuggestions(list) {
            const suggestionsDiv = document.getElementById('suggestions');
            if (!suggestionsDiv) return;
            suggestionsDiv.innerHTML = '';
            
            if (!list || list.length === 0) return;
            
            list.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = item;
                btn.onclick = () => {
                    document.getElementById('messageInput').value = item;
                    sendMessage();
                };
                suggestionsDiv.appendChild(btn);
            });
        }
        
        function updateProgress(mastered, total) {
            const fill = document.getElementById('progressFill');
            if (fill && total > 0) {
                const percent = (mastered / total) * 100;
                fill.style.width = percent + '%';
            }
        }
        
        // ============================================
        // API FUNCTIONS
        // ============================================
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "🤔 Teacher is thinking...";
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, level: currentLevel })
                });
                
                const data = await response.json();
                addMessage(data.reply, false);
                
                if (data.suggestions) addSuggestions(data.suggestions);
                if (data.word_info) {
                    updateProgress(data.word_info.words_mastered?.length || 0, data.word_info.total_words || 0);
                }
                
                statusDiv.innerHTML = "✅ Ready";
            } catch (error) {
                console.error("Error:", error);
                addMessage("Sorry, connection error. Please refresh.", false);
                statusDiv.innerHTML = "❌ Error";
            }
        }
        
        async function startLesson() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "🎓 Loading...";
            
            try {
                const response = await fetch('/api/welcome', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: currentLevel })
                });
                
                const data = await response.json();
                addMessage(data.welcome, false);
                addSuggestions(["yes", "start lesson", "help"]);
                statusDiv.innerHTML = "✅ Ready - Type 'yes' to begin";
            } catch (error) {
                console.error("Error:", error);
                addMessage("👋 Welcome! Type 'yes' to begin your lesson.", false);
                addSuggestions(["yes", "help"]);
                statusDiv.innerHTML = "✅ Ready";
            }
        }
        
        function restartLesson() {
            document.getElementById('chatArea').innerHTML = '';
            updateProgress(0, 0);
            startLesson();
        }
        
        function levelUp() {
            if (currentLevel < 6) {
                currentLevel++;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`🎉 Advanced to HSK Level ${currentLevel}!`, false);
                addSuggestions(["yes", "start lesson"]);
                updateProgress(0, 0);
                // Reset chat and start new level lesson
                setTimeout(() => startLesson(), 500);
            } else {
                addMessage("🌟 You've reached HSK 6! Amazing!", false);
            }
        }
        
        function levelDown() {
            if (currentLevel > 1) {
                currentLevel--;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`📚 Moved to HSK Level ${currentLevel} for review.`, false);
                addSuggestions(["yes", "start lesson"]);
                updateProgress(0, 0);
                setTimeout(() => startLesson(), 500);
            } else {
                addMessage("You're at HSK 1 - the perfect starting point!", false);
            }
        }
        
        // ============================================
        // INITIALIZE
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log("App starting...");
            startLesson();
        });
    </script>
</body>
</html>
