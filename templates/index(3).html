<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Mandarin Teacher - Voice Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #1a472a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .level-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a472a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .teacher-message {
            justify-content: flex-start;
        }
        
        .student-message {
            justify-content: flex-end;
        }
        
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .teacher-message .bubble {
            background: white;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .student-message .bubble {
            background: #2d6a4f;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        input[type="text"] {
            flex: 2;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            min-width: 150px;
        }
        
        input[type="text"]:focus {
            border-color: #2d6a4f;
        }
        
        button {
            padding: 15px 25px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .voice-btn {
            background: #e94560;
        }
        
        .voice-btn.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }
        
        .speaker-btn {
            background: #ffd700;
            color: #1a472a;
            padding: 10px 15px;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .suggestion-btn {
            background: #f0f0f0;
            color: #333;
            padding: 8px 15px;
            font-size: 12px;
        }
        
        .suggestion-btn:hover {
            background: #e0e0e0;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .small-btn {
            padding: 8px 12px;
            font-size: 11px;
            background: #764ba2;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .pronunciation-feedback {
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 13px;
        }
        
        .feedback-correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .feedback-wrong {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        @media (max-width: 600px) {
            .bubble {
                max-width: 90%;
                font-size: 14px;
            }
            
            .input-group {
                flex-wrap: wrap;
            }
            
            input[type="text"] {
                flex: 1 1 100%;
            }
            
            button {
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 AI Mandarin Teacher</h1>
            <p>Voice Interactive • Pronunciation Coach</p>
            <div class="level-badge" id="levelBadge">HSK Level 1</div>
        </div>
        
        <div class="chat-area" id="chatArea"></div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type or speak your response..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="voiceBtn" class="voice-btn" onclick="toggleRecording()">🎤 Speak</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
            <div id="pronunciationFeedback" class="pronunciation-feedback" style="display: none;"></div>
            <div class="controls">
                <button class="small-btn" onclick="location.href='/dashboard'">📊 Dashboard</button>
                <button class="small-btn" onclick="location.href='/certificate'">🎓 Certificate</button>
                <button class="small-btn" onclick="location.href='/hsk-practice'">📝 Test</button>
                <button class="small-btn" onclick="location.href='/homework'">📚 Homework</button>
                <button class="small-btn" onclick="restartLesson()">🔄 New Lesson</button>
                <button class="small-btn" onclick="levelUp()">⬆️ Level Up</button>
                <button class="small-btn" onclick="levelDown()">⬇️ Level Down</button>
            </div>
            <div class="status" id="status">🎤 Ready to learn! Click "Speak" and repeat after the teacher.</div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let isRecording = false;
        let recognition = null;
        let speechSynthesis = window.speechSynthesis;
        let currentTTSText = "";
        let lessonState = { started: false };
        
        // Initialize Speech Recognition
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                
                recognition.onresult = function(event) {
                    const text = event.results[0][0].transcript;
                    document.getElementById('messageInput').value = text;
                    updateStatus("Processing your speech...");
                    // Send as pronunciation attempt
                    sendMessage(true);
                    stopRecording();
                };
                
                recognition.onerror = function(event) {
                    console.error('Recognition error:', event.error);
                    if (event.error === 'not-allowed') {
                        updateStatus("Microphone access denied. Please allow microphone and refresh.");
                    } else {
                        updateStatus("Could not understand. Please type your response.");
                    }
                    stopRecording();
                };
                
                recognition.onend = function() {
                    stopRecording();
                };
                
                return true;
            } else {
                updateStatus("Speech recognition not supported. Please type your responses.");
                document.getElementById('voiceBtn').disabled = true;
                document.getElementById('voiceBtn').style.opacity = '0.5';
                return false;
            }
        }
        
        function toggleRecording() {
            if (!recognition) {
                initSpeechRecognition();
            }
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            if (!recognition) return;
            isRecording = true;
            try {
                recognition.start();
                const voiceBtn = document.getElementById('voiceBtn');
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '🔴 Recording...';
                updateStatus("Listening... Speak clearly in Mandarin");
            } catch (e) {
                console.error('Start recording error:', e);
                stopRecording();
                updateStatus("Click 'Speak' again to start recording");
            }
        }
        
        function stopRecording() {
            if (recognition && isRecording) {
                try {
                    recognition.stop();
                } catch (e) {}
            }
            isRecording = false;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '🎤 Speak';
            if (!document.getElementById('status').innerHTML.includes('Processing')) {
                updateStatus("Ready");
            }
        }
        
        function speakText(text) {
            if (!text) return;
            
            // Clean text for speaking
            let cleanText = text.replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
            cleanText = cleanText.substring(0, 200);
            
            // Cancel any ongoing speech
            speechSynthesis.cancel();
            
            // Create utterance
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Try to use Chinese voice if available
            const voices = speechSynthesis.getVoices();
            const chineseVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('cmn'));
            if (chineseVoice) {
                utterance.voice = chineseVoice;
            }
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            
            utterance.onstart = () => {
                updateStatus("🔊 Teacher speaking...");
            };
            
            utterance.onend = () => {
                updateStatus("Ready for your response");
                // Auto-start listening after teacher speaks (if enabled)
                // setTimeout(() => startRecording(), 500);
            };
            
            speechSynthesis.speak(utterance);
        }
        
        function updateStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }
        
        function showFeedback(isCorrect, message) {
            const feedbackDiv = document.getElementById('pronunciationFeedback');
            if (!message) {
                feedbackDiv.style.display = 'none';
                return;
            }
            feedbackDiv.style.display = 'block';
            feedbackDiv.className = `pronunciation-feedback ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
            feedbackDiv.innerHTML = isCorrect ? `✅ ${message}` : `🔄 ${message}`;
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                if (feedbackDiv.style.display !== 'none') {
                    feedbackDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        function showTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message teacher-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function addMessage(text, isStudent, ttsText = null) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = isStudent ? 'message student-message' : 'message teacher-message';
            
            let bubbleContent = `<div class="bubble">${text}</div>`;
            
            if (!isStudent && ttsText) {
                bubbleContent = `<div class="bubble">
                    ${text}
                    <button class="speaker-btn" onclick="speakText('${ttsText.replace(/'/g, "\\'")}')" style="margin-left: 10px; padding: 5px 10px;">🔊</button>
                </div>`;
            } else if (!isStudent) {
                bubbleContent = `<div class="bubble">
                    ${text}
                    <button class="speaker-btn" onclick="speakText('${text.replace(/'/g, "\\'")}')" style="margin-left: 10px; padding: 5px 10px;">🔊</button>
                </div>`;
            }
            
            messageDiv.innerHTML = bubbleContent;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            // Auto-speak teacher messages
            if (!isStudent && ttsText) {
                speakText(ttsText);
            } else if (!isStudent && text) {
                speakText(text);
            }
        }
        
        function addSuggestions(suggestions) {
            const suggestionsDiv = document.getElementById('suggestions');
            suggestionsDiv.innerHTML = '';
            if (!suggestions || suggestions.length === 0) return;
            
            suggestions.forEach(suggestion => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = suggestion;
                btn.onclick = () => {
                    document.getElementById('messageInput').value = suggestion;
                    sendMessage(false);
                };
                suggestionsDiv.appendChild(btn);
            });
        }
        
        async function sendMessage(isPronunciationAttempt = false) {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            updateStatus("Teacher is thinking... 🤔");
            showTypingIndicator();
            showFeedback(false, null);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        level: currentLevel,
                        lessonState: lessonState,
                        is_pronunciation: isPronunciationAttempt
                    })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                addMessage(data.reply, false, data.tts_text);
                
                if (data.pronunciation_feedback) {
                    showFeedback(false, data.pronunciation_feedback);
                }
                
                if (data.suggestions) {
                    addSuggestions(data.suggestions);
                } else {
                    addSuggestions(["Yes", "Continue", "Repeat", "Next word"]);
                }
                
                updateStatus("Ready for your response - click Speak to practice pronunciation");
                
            } catch (error) {
                hideTypingIndicator();
                addMessage("Sorry, connection error. Please refresh the page.", false);
                updateStatus("Error - check connection");
            }
        }
        
        async function sendWelcomeMessage() {
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/welcome', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: currentLevel })
                });
                
                const data = await response.json();
                hideTypingIndicator();
                addMessage(data.welcome, false, data.tts_text);
                addSuggestions(["yes", "start lesson", "help"]);
                updateStatus("Ready - say 'yes' to begin!");
                lessonState.started = true;
                
            } catch (error) {
                hideTypingIndicator();
                addMessage("👋 Welcome to Mandarin Teacher! Type 'yes' to begin your lesson.", false);
                addSuggestions(["yes", "help"]);
            }
        }
        
        function restartLesson() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            lessonState = { started: false };
            sendWelcomeMessage();
        }
        
        function levelUp() {
            if (currentLevel < 6) {
                currentLevel++;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`🎉 Great job! You've advanced to HSK Level ${currentLevel}!`, false);
                addSuggestions(["Start new lesson", "Review", "Take test"]);
                lessonState = { started: false };
            } else {
                addMessage("🌟 Amazing! You've reached HSK 6! You're practically fluent!", false);
                addSuggestions(["Take mastery test", "Get certificate", "Review"]);
            }
        }
        
        function levelDown() {
            if (currentLevel > 1) {
                currentLevel--;
                document.getElementById('levelBadge').innerHTML = `HSK Level ${currentLevel}`;
                addMessage(`📚 Moving to HSK Level ${currentLevel} for review.`, false);
                addSuggestions(["Start review", "Practice basics"]);
                lessonState = { started: false };
            } else {
                addMessage("You're at HSK 1 - the perfect starting point!", false);
                addSuggestions(["start lesson", "learn greetings"]);
            }
        }
        
        // Load voices for speech synthesis
        window.speechSynthesis.onvoiceschanged = () => {
            const voices = speechSynthesis.getVoices();
            console.log("Voices loaded:", voices.length);
        };
        
        // Initialize
        initSpeechRecognition();
        sendWelcomeMessage();
    </script>
</body>
</html>
